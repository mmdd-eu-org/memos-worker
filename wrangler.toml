name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]
[[d1_databases]]
binding = "DB"
database_id = "024e4fe1-7189-4555-a669-dbed31108764"
database_name = "notes-db"
[[kv_namespaces]]
binding = "NOTES_KV"
id = "db566704092446d3b8779aae905a859f"
preview_id = ""
[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "notes-r2-bucket"
preview_bucket_name = "notes-files-preview"
